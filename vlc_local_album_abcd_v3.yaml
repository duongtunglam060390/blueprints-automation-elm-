blueprint:
  name: "VLC Local Album A/B/C/D"
  description: "Play shuffled local albums with fadeout and skip support"
  domain: automation

  input:
    sensor_a:
      name: "Sensor A (Play/Stop)"
      selector:
        entity: {}

    sensor_b:
      name: "Sensor B (Volume Up)"
      default: []
      selector:
        entity: {}

    sensor_c:
      name: "Sensor C (Volume Down)"
      default: []
      selector:
        entity: {}

    sensor_d:
      name: "Sensor D (Next Track)"
      default: []
      selector:
        entity: {}

    media_player:
      name: "Target VLC Media Player"
      selector:
        entity:
          domain: media_player

    base_url:
      name: "Base URL"
      default: "http://homeassistant.local:8123"
      selector:
        text: {}

mode: restart
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input sensor_a
    id: sensor_a

  - platform: state
    entity_id: !input sensor_b
    id: sensor_b

  - platform: state
    entity_id: !input sensor_c
    id: sensor_c

  - platform: state
    entity_id: !input sensor_d
    id: sensor_d

action:
  - choose:

      # SENSOR A PLAY
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'sensor_a' and trigger.to_state.state == 'on' }}"
        sequence:
          - service: media_player.volume_set
            target:
              entity_id: !input media_player
            data:
              volume_level: 0.18
          - service: media_player.play_media
            target:
              entity_id: !input media_player
            data:
              media_content_id: "{{ !input base_url }}/local/music/album1"
              media_content_type: music

      # SENSOR A STOP (FADE SIMPLE)
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'sensor_a' and trigger.to_state.state == 'off' }}"
        sequence:
          - service: media_player.media_stop
            target:
              entity_id: !input media_player

      # VOLUME UP
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'sensor_b' }}"
        sequence:
          - service: media_player.volume_up
            target:
              entity_id: !input media_player

      # VOLUME DOWN
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'sensor_c' }}"
        sequence:
          - service: media_player.volume_down
            target:
              entity_id: !input media_player

      # NEXT TRACK
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'sensor_d' }}"
        sequence:
          - service: media_player.media_next_track
            target:
              entity_id: !input media_player

    default: []
