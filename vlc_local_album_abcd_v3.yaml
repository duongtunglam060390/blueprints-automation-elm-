blueprint:
  name: "VLC Local Album A/B/C/D (Fixed)"
  description: "Play local music via VLC with A/B/C/D controls"
  domain: automation

  input:
    sensor_a:
      name: "Sensor A (Play/Stop)"
      selector:
        entity: {}

    sensor_b:
      name: "Sensor B (Volume Up)"
      default: []
      selector:
        entity: {}

    sensor_c:
      name: "Sensor C (Volume Down)"
      default: []
      selector:
        entity: {}

    sensor_d:
      name: "Sensor D (Next Track)"
      default: []
      selector:
        entity: {}

    media_player:
      name: "Target VLC Media Player"
      selector:
        entity:
          domain: media_player

    base_url:
      name: "Base URL"
      description: "Ví dụ: http://192.168.1.200:8123"
      default: "http://homeassistant.local:8123"
      selector:
        text: {}

    test_track:
      name: "Test track path under /local (để test nhanh)"
      description: "Ví dụ: music/album1/test.mp3  (tương ứng /config/www/music/album1/test.mp3)"
      default: "music/album1/test.mp3"
      selector:
        text: {}

mode: restart
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input sensor_a
    id: sensor_a

  - platform: state
    entity_id: !input sensor_b
    id: sensor_b

  - platform: state
    entity_id: !input sensor_c
    id: sensor_c

  - platform: state
    entity_id: !input sensor_d
    id: sensor_d

variables:
  mp: !input media_player
  base: !input base_url
  track: !input test_track

action:
  - choose:

      # A ON -> play test track (để xác nhận VLC đọc được /local)
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'sensor_a' and trigger.to_state is not none and trigger.to_state.state == 'on' }}"
        sequence:
          - service: media_player.volume_set
            target:
              entity_id: "{{ mp }}"
            data:
              volume_level: 0.18
          - service: media_player.play_media
            target:
              entity_id: "{{ mp }}"
            data:
              media_content_id: "{{ base.rstrip('/') ~ '/local/' ~ track }}"
              media_content_type: music

      # A OFF -> stop
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'sensor_a' and trigger.to_state is not none and trigger.to_state.state == 'off' }}"
        sequence:
          - service: media_player.media_stop
            target:
              entity_id: "{{ mp }}"

      # B -> volume up
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'sensor_b' }}"
        sequence:
          - service: media_player.volume_up
            target:
              entity_id: "{{ mp }}"

      # C -> volume down
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'sensor_c' }}"
        sequence:
          - service: media_player.volume_down
            target:
              entity_id: "{{ mp }}"

      # D -> next track
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'sensor_d' }}"
        sequence:
          - service: media_player.media_next_track
            target:
              entity_id: "{{ mp }}"

    default: []
